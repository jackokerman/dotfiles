# =============================================================================
# Terminal and display
# =============================================================================

# Enable true color support (required for nightfly and other modern themes)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',xterm-256color:Tc'

# Enable undercurl and colored underlines
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# =============================================================================
# General settings
# =============================================================================

# Use Ctrl-a as prefix (easier to reach than Ctrl-b)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Nested tmux toggle (Ctrl+B suspends local tmux for remote sessions)
# Press Ctrl+B to toggle: local tmux goes passive, all keys pass to remote tmux.
# Press Ctrl+B again to restore local tmux control (for sesh, local splits, etc.)
#
# Nightfly palette reference:
#   #011627 = black (editor bg)    #092236 = dark blue (status bg)
#   #4b6479 = steel blue (muted)   #82aaff = blue (accent)
#   #9fa8b6 = cadet blue (fg)      #f78c6c = orange (prefix indicator)
bind -T root C-b \
  set prefix None \;\
  set key-table off \;\
  set status-style "bg=#011627,fg=#4b6479" \;\
  set status-left "#[fg=#4b6479]⠶ #S " \;\
  set status-right "#(~/.config/tmux/session-status.sh)" \;\
  setw window-status-current-style "bg=#092236,fg=#4b6479" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off C-b \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u status-left \;\
  set -u status-right \;\
  setw -u window-status-current-style \;\
  refresh-client -S

# Reduce escape delay (important for vim/neovim)
set -g escape-time 0

# Increase scrollback history
set -g history-limit 50000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support (scroll, click to select pane, resize panes)
setw -g mouse on

# Enable system clipboard integration
set -g set-clipboard on

# Focus events for vim/neovim autocommands
set -g focus-events on

# Vi mode for copy mode and status line
setw -g mode-keys vi
set -g status-keys vi

# =============================================================================
# Key bindings
# =============================================================================

# Kill pane without confirmation prompt
bind x kill-pane

# Stay in tmux when destroying a session (switch to another instead of detaching)
set -g detach-on-destroy off

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Splits: | for horizontal, - for vertical (preserve working directory)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window preserving working directory
unbind c
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle zoom on current pane
bind -r m resize-pane -Z

# Copy mode: v to select, y to copy (like vim)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Switch to last session (via sesh)
bind Tab run-shell "sesh last"

# Session picker (sesh + fzf in a tmux popup)
# C-t in root table so it works without prefix, and in off table so it reaches
# the local sesh even when keys are passing through to the remote tmux.
bind -T root C-t display-popup -E -w 55% -h 60% 'sesh-pick'
bind -T off  C-t display-popup -E -w 55% -h 60% 'sesh-pick'
bind T display-popup -E -w 55% -h 60% 'sesh-pick'

# Theme (nightfly)
source-file ~/.config/tmux/themes/nightfly.tmux
set -g status-left-length 50

# Claude session status indicators (replaces theme clock)
set -g status-interval 2
set -g monitor-bell on
set -g bell-action any
set -g status-right-length 120
set -g status-right "#(~/.config/tmux/session-status.sh)"

# Refresh status bar immediately on session switch so the current session
# disappears from the Claude status section without waiting for the next poll.
set-hook -g session-changed 'refresh-client -S'

# Local overrides (loaded from overlay repos if present)
if-shell '[ -f ~/.config/tmux/tmux.local.conf ]' 'source-file ~/.config/tmux/tmux.local.conf'
